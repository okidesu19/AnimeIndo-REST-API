version: '3.8'

services:
  # Main API service dengan Playwright
  api-playwright:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    ports:
      - "8000:8000"
    environment:
      # Pilih salah satu provider, atau biarkan kosong untuk fallback
      TYPE_GET_STREAMING: "PLAYWRIGHT"  # or PROXY, SCRAPERAPI, SCRAPINGBEE, WEBSHARE, SSH, BRIGHTDATA
      
      # Opsi: Proxy fallback jika ada error
      # PROXY_URL: "http://user:pass@proxy-host:port"
      
      # Opsi: SSH tunnel (LionSSH, FastSSH)
      # SSH_HOST: "your-ssh-host.com"
      # SSH_USER: "username"
      # SSH_PASSWORD: "password"
      
      # Opsi: Scraping API
      # SCRAPERAPI_KEY: "your_key"
      SCRAPINGBEE_KEY: "29QJ0HGZXCPTTWDLFW2PNRVH6TUUIH8TI048LGAQ659OEIXQ70O7KG7YYK2A3VNP13PNMOEKJT7VJ2M0"
      
      # Opsi: WebShare free proxy
      # WEBSHARE_API_KEY: "your_api_key"
      # WEBSHARE_API_PASSWORD: "your_password"
      
      # Opsi: BrightData proxy
      # BRIGHTDATA_PROXY: "http://user:pass@host:port"
    
    # Volume untuk logs (optional)
    volumes:
      - ./logs:/app/logs
    
    # Restart policy
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: API service tanpa Playwright (proxy/scraper fallback)
  api-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      TYPE_GET_STREAMING: "PROXY"
      PROXY_URL: "http://zgcxuetu:2af5g453z03w@84.247.60.125:6095"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
